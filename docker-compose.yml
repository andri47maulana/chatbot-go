version: "3.9"

# ============================================================
# AIGRI WhatsApp Bot – Portainer Stack
# ============================================================
# Prerequisites (provide via Portainer env vars or .env):
#   OPENAI_API_KEY   – required
#   DB_HOST / DB_PORT / DB_NAME / DB_USER / DB_PASSWORD
#   WAHA_API_KEY     – set same value in whatsapp-bot AND waha services
# ============================================================

services:

  # ---- WhatsApp Bot (Go) --------------------------------------------------
  whatsapp-bot:
    image: ${BOT_IMAGE:-aigri/whatsapp-bot:latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BOT_PORT:-9000}:9000"
    environment:
      APP_PORT: "9000"
      # Database (point to your existing MySQL or add a db service below)
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_NAME:-aigri}
      DB_USERNAME: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # WAHA
      WAHA_BASE_URL: http://waha:3000
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      WAHA_SESSION: ${WAHA_SESSION:-default}
      WAHA_AUTO_RESTART: ${WAHA_AUTO_RESTART:-true}
      # RAG Backend (existing Python service)
      RAG_BASE_URL: ${RAG_BASE_URL:-http://host.docker.internal:5002}
      RAG_API_KEY: ${RAG_API_KEY:-1245}
      # Bot identity
      BOT_PHONE_NUMBER: ${BOT_PHONE_NUMBER:-}
      # Worker pool
      WORKER_COUNT: ${WORKER_COUNT:-20}
      JOB_QUEUE_SIZE: ${JOB_QUEUE_SIZE:-500}
      DEDUPE_WINDOW_MIN: ${DEDUPE_WINDOW_MIN:-5}
    depends_on:
      redis:
        condition: service_healthy
      waha:
        condition: service_started
    networks:
      - bot-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---- WAHA (WhatsApp HTTP API) -------------------------------------------
  waha:
    image: devlikeapro/waha-plus:chrome
    restart: unless-stopped
    ports:
      - "${WAHA_PORT:-3000}:3000"
    volumes:
      - waha-media:/app/.media
      - waha-sessions:/app/.sessions
    environment:
      WHATSAPP_API_KEY: ${WAHA_API_KEY:-}
      WHATSAPP_HOOK_URL: http://whatsapp-bot:9000/webhook
      WHATSAPP_HOOK_EVENTS: "message"
      # Uncomment to restrict webhook to specific session:
      # WHATSAPP_DEFAULT_ENGINE: NOWEB
    networks:
      - bot-net

  # ---- Redis (session / dedup cache) --------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - bot-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

# ---- OPTIONAL: MySQL (comment out if using external DB) -------------------
# mysql:
#   image: mysql:8.0
#   restart: unless-stopped
#   environment:
#     MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
#     MYSQL_DATABASE: ${DB_NAME:-aigri}
