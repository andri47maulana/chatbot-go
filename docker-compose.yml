# ============================================================
# AIGRI WhatsApp Bot – Portainer Stack
# ============================================================
# Prerequisites (provide via Portainer env vars or .env):
#   OPENAI_API_KEY   – required
#   DB_HOST / DB_PORT / DB_NAME / DB_USER / DB_PASSWORD
#   WAHA sudah running di stack waha-full-prod port 3010
# ============================================================

services:

  # ---- WhatsApp Bot (Go) --------------------------------------------------
  # Image dibangun otomatis via GitHub Actions → ghcr.io
  whatsapp-bot:
    image: ghcr.io/andri47maulana/chatbot-go:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${BOT_PORT:-9000}:9000"
    environment:
      APP_PORT: "9000"
      DB_HOST: ${DB_HOST:-127.0.0.1}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_NAME:-ai_lokal_db}
      DB_USERNAME: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
      # Redis
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # WAHA – pakai container waha_full yang sudah berjalan di port 3010
      WAHA_BASE_URL: ${WAHA_BASE_URL:-http://host.docker.internal:3010}
      WAHA_API_KEY: ${WAHA_API_KEY:-}
      WAHA_SESSION: ${WAHA_SESSION:-default}
      WAHA_AUTO_RESTART: ${WAHA_AUTO_RESTART:-true}
      # RAG Backend
      RAG_BASE_URL: ${RAG_BASE_URL:-http://host.docker.internal:5001}
      RAG_API_KEY: ${RAG_API_KEY:-1245}
      # Bot identity
      BOT_PHONE_NUMBER: ${BOT_PHONE_NUMBER:-}
      # Worker pool
      WORKER_COUNT: ${WORKER_COUNT:-20}
      JOB_QUEUE_SIZE: ${JOB_QUEUE_SIZE:-500}
      DEDUPE_WINDOW_MIN: ${DEDUPE_WINDOW_MIN:-5}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bot-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---- Redis (session / dedup cache) --------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - bot-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:

networks:
  bot-net:
    driver: bridge
